name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: make
      - name: Check artifacts
        run: |
          ls -l libuhf.a uhf_probe uhf_scan uhf_console
          file uhf_probe uhf_scan uhf_console
